<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 왈왈 사주팔자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: 'Press Start 2P', monospace;
}

.gb {
  background: linear-gradient(160deg, #b0bed0, #8b9dc3);
  border-radius: 14px 14px 50px 50px;
  padding: 16px 16px 28px;
  width: 360px;
  box-shadow: 4px 4px 0 #5a6a8a, -2px -2px 0 #c8d5f0, 0 24px 48px rgba(0,0,0,0.7);
}

.gb-label {
  text-align: center;
  font-size: 7px;
  color: #4a5a7a;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.bezel {
  background: #1e2030;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 14px;
  box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5);
}

.screen {
  background: #9bbc0f;
  border-radius: 4px;
  width: 100%;
  height: 260px;
  position: relative;
  overflow: hidden;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.blink { animation: blink 1s infinite; }
.bounce { animation: bounce 0.8s infinite; }
.fade-in { animation: fadeIn 0.3s ease; }

/* BUTTONS */
.gb-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;
  margin-bottom: 10px;
}

.dpad {
  display: grid;
  grid-template: repeat(3,24px)/repeat(3,24px);
  gap: 2px;
}
.dpad-btn {
  background: #3a4a6a;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  color: #8b9dc3;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dpad-btn:hover { background: #4a5a7a; }
.dpad-center { background: #2a3a5a !important; border-radius: 50% !important; cursor: default !important; }

.ab-buttons {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 16px;
}
.ab-row { display: flex; gap: 8px; }
.btn-circle {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: #b03060;
  color: white;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  cursor: pointer;
  box-shadow: 2px 3px 0 #7a1a40;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-circle:active { transform: translateY(2px); box-shadow: 0 1px 0 #7a1a40; }
.btn-circle:hover { background: #c04070; }

.start-select {
  display: flex;
  justify-content: center;
  gap: 16px;
}
.btn-flat {
  width: 44px; height: 12px;
  background: #3a4a6a;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.btn-flat:hover { background: #4a5a7a; }
.btn-label {
  display: flex;
  justify-content: center;
  gap: 36px;
  margin-top: 3px;
}
.btn-label span { font-size: 5px; color: #4a5a7a; }

/* SCREEN CONTENT */
.s-full {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
  gap: 8px;
}

.s-title {
  font-size: 10px;
  color: #0f380f;
  text-align: center;
  line-height: 2;
  text-shadow: 1px 1px 0 #8bac0f;
}

.s-sub { font-size: 5px; color: #306230; text-align: center; line-height: 2; }
.s-sm { font-size: 6px; color: #0f380f; }
.s-xs { font-size: 5px; color: #0f380f; }
.s-mid { font-size: 6px; color: #306230; }

.dialogue {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #9bbc0f;
  border-top: 3px solid #0f380f;
  padding: 8px;
  min-height: 72px;
}

/* FORM */
.form-scroll {
  height: 100%;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  scrollbar-width: none;
}
.form-scroll::-webkit-scrollbar { display: none; }

.form-section { font-size: 6px; color: #0f380f; border-bottom: 1px solid #306230; padding-bottom: 2px; }
.form-label { font-size: 5px; color: #306230; margin-bottom: 3px; }

.px-input {
  width: 100%;
  background: #8bac0f;
  border: 2px solid #0f380f;
  color: #0f380f;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 5px 4px;
  outline: none;
}
.px-input:focus { background: #306230; color: #9bbc0f; }
.px-input[type="date"] { cursor: pointer; }

.breed-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 3px;
}
.breed-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 3px 2px;
  border: 2px solid transparent;
  border-radius: 2px;
}
.breed-item:hover { border-color: #306230; }
.breed-item.sel { border-color: #0f380f; background: #306230; }
.breed-item canvas { image-rendering: pixelated; }
.breed-name { font-size: 4px; color: #0f380f; margin-top: 2px; text-align: center; }
.breed-item.sel .breed-name { color: #9bbc0f; }

.px-btn {
  background: #0f380f;
  color: #9bbc0f;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 7px;
  cursor: pointer;
  width: 100%;
}
.px-btn:hover { background: #306230; }

/* RESULT */
.result-header {
  background: #0f380f;
  color: #9bbc0f;
  font-size: 6px;
  padding: 5px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.result-body {
  flex: 1;
  padding: 8px;
  overflow-y: auto;
  scrollbar-width: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.result-body::-webkit-scrollbar { display: none; }

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 5px;
  color: #0f380f;
  border-bottom: 1px solid #8bac0f;
  padding: 3px 0;
}
.stat-bar {
  display: flex;
  gap: 2px;
}
.stat-pip {
  width: 8px; height: 8px;
  border: 1px solid #0f380f;
  background: transparent;
}
.stat-pip.filled { background: #0f380f; }

.tag {
  display: inline-block;
  background: #0f380f;
  color: #9bbc0f;
  font-size: 4px;
  padding: 2px 4px;
}

.today-box {
  background: #8bac0f;
  border: 2px solid #0f380f;
  padding: 5px;
  font-size: 5px;
  color: #0f380f;
  line-height: 1.9;
}

.together-badge {
  background: #306230;
  color: #9bbc0f;
  font-size: 5px;
  padding: 4px 6px;
  text-align: center;
  border: 2px solid #0f380f;
}
</style>
</head>
<body>

<div class="gb">

  <div class="start-select">

  </div>
  <div class="btn-label">
    <span>SELECT</span>
    <span>START</span>
  </div>
</div>

const BREEDS = ['말티즈','포메라니안','시바이누','웰시코기','골든리트리버','푸들','진돗개','치와와'];

// =============================================
// FORTUNE ENGINE
// =============================================
const ZODIAC = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
const ELEMENTS = ['목','화','토','금','수'];
const ELEM_DESC = { '목':'창의적', '화':'열정적', '토':'안정적', '금':'강인한', '수':'유연한' };

function getZodiac(y) { return ZODIAC[(y - 4) % 12]; }
function getElement(y) { return ELEMENTS[Math.floor(((y - 4) % 10) / 2)]; }
function getSeason(m) {
  if(m>=3&&m<=5) return '봄'; if(m>=6&&m<=8) return '여름';
  if(m>=9&&m<=11) return '가을'; return '겨울';
}

function daysBetween(d1, d2) {
  const a = new Date(d1), b = new Date(d2);
  return Math.floor(Math.abs(b - a) / (1000*60*60*24));
}

const FORTUNE_DB = {

  '닭':  { trait:'부지런하고 꼼꼼함', lucky:'그루밍', warn:'불규칙식사', love:3, health:5, money:5 },

const BREED_MSG = {

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function makeFortune(name, breed, birth, adopt) {
  const bd = new Date(birth);
  const zodiac = getZodiac(bd.getFullYear());
  const element = getElement(bd.getFullYear());
  const season = getSeason(bd.getMonth()+1);
  const fd = FORTUNE_DB[zodiac] || FORTUNE_DB['개'];
  const today = new Date().toISOString().split('T')[0];
  const agedays = daysBetween(birth, today);
  const togetherdays = adopt ? daysBetween(adopt, today) : null;
  const years = Math.floor(agedays/365);
  const months = Math.floor((agedays%365)/30);
  return { zodiac, element, season, fd, breed, name, birth, adopt, agedays, togetherdays, years, months };
}

// =============================================
// GAME STATE
// =============================================
let G = {
  screen: 'title',
  name: '', breed: '말티즈', birth: '', adopt: '',
  fortune: null,
  rPage: 0,
};

// =============================================
// RENDER
// =============================================
function render() {
  const sc = document.getElementById('screen');
  sc.className = 'screen fade-in';
  if (G.screen === 'title') renderTitle(sc);
  else if (G.screen === 'input') renderInput(sc);
  else if (G.screen === 'loading') renderLoading(sc);
  else if (G.screen === 'result') renderResult(sc);
}

function renderTitle(sc) {
  sc.innerHTML = `
    <div class="s-full">
      <div class="s-title">🐾 왈왈<br>사주팔자</div>
      <canvas id="tc" width="48" height="48" style="image-rendering:pixelated;" class="bounce"></canvas>
      <div class="s-sub">내 강아지의 운명을<br>알아보세요!</div>
      <div class="s-mid blink" style="font-size:6px;">▶ A버튼 또는 START</div>
    </div>`;
  setTimeout(()=>{ const c=document.getElementById('tc'); if(c) drawDog(c,'시바이누',12); },30);
}

function renderInput(sc) {
  sc.innerHTML = `
    <div class="form-scroll">
      <div class="form-section">강아지 정보 입력</div>

      <div>
        <div class="form-label">이름</div>
        <input class="px-input" id="iname" type="text" placeholder="예) 뭉치" maxlength="6" value="${G.name}"/>
      </div>

      <div>
        <div class="form-label">🎂 생일</div>
        <input class="px-input" id="ibirth" type="date" value="${G.birth}"/>
      </div>

      <div>
        <div class="form-label">🏠 입양날짜 (선택)</div>
        <input class="px-input" id="iadopt" type="date" value="${G.adopt}"/>
        <div style="font-size:4px;color:#306230;margin-top:2px;">입력하면 함께한 날수를 알려드려요!</div>
      </div>

      <div>
        <div class="form-label">견종 선택</div>
        <div class="breed-grid" id="bgrid">
          ${BREEDS.map(b=>`
            <div class="breed-item${b===G.breed?' sel':''}" onclick="pickBreed('${b}')">
              <canvas id="bc_${b.replace(/\s/g,'')}" width="24" height="24" style="image-rendering:pixelated;"></canvas>
              <div class="breed-name">${b}</div>
            </div>`).join('')}
        </div>
      </div>

      <button class="px-btn" onclick="goFortune()">🔮 사주 보기 ▶</button>
    </div>`;

  setTimeout(()=>{
    BREEDS.forEach(b=>{
      const c=document.getElementById('bc_'+b.replace(/\s/g,''));
      if(c) drawDog(c,b,12);
    });
  },30);
}

function pickBreed(b) {
  G.breed = b;
  renderInput(document.getElementById('screen'));
}

function goFortune() {
  G.name = document.getElementById('iname').value.trim();
  G.birth = document.getElementById('ibirth').value;
  G.adopt = document.getElementById('iadopt').value;
  if(!G.name || !G.birth) {
    document.getElementById('iname').style.borderColor='#c03030';
    setTimeout(()=>{ if(document.getElementById('iname')) document.getElementById('iname').style.borderColor='#0f380f'; },800);
    return;
  }
  G.fortune = makeFortune(G.name, G.breed, G.birth, G.adopt||null);
  G.screen = 'loading';
  G.rPage = 0;
  render();
  setTimeout(()=>{ G.screen='result'; render(); }, 2200);
}

const LOAD_MSGS = [
  '천지인 기운을\n읽는 중...',
  '별자리 계산 중...',
  '운명의 실\n엮는 중...',
];
let loadIdx = 0;

function renderLoading(sc) {
  loadIdx = 0;
  sc.innerHTML = `
    <div class="s-full">
      <canvas id="lc" width="48" height="48" style="image-rendering:pixelated;" class="bounce"></canvas>
      <div class="s-sm" id="lmsg" style="text-align:center;line-height:2;">${LOAD_MSGS[0]}</div>
      <div style="display:flex;gap:5px;">
        <div style="width:7px;height:7px;background:#0f380f;animation:blink .5s 0s infinite;"></div>
        <div style="width:7px;height:7px;background:#0f380f;animation:blink .5s .2s infinite;"></div>
        <div style="width:7px;height:7px;background:#0f380f;animation:blink .5s .4s infinite;"></div>
      </div>
    </div>`;
  setTimeout(()=>{ const c=document.getElementById('lc'); if(c) drawDog(c,G.breed,12); },30);
  const iv = setInterval(()=>{
    loadIdx = (loadIdx+1)%LOAD_MSGS.length;
    const el = document.getElementById('lmsg');
    if(el) el.innerHTML = LOAD_MSGS[loadIdx].replace('\n','<br>');
    else clearInterval(iv);
  }, 700);
}

function renderResult(sc) {
  const f = G.fortune;
  const pages = [buildPage0(f), buildPage1(f), buildPage2(f)];
  sc.innerHTML = pages[G.rPage];
  setTimeout(()=>{
    const c=document.getElementById('rc');
    if(c) drawDog(c,G.breed,12);
  },30);
}

function buildPage0(f) {
  const together = f.togetherdays !== null
    ? `<div class="together-badge">🏠 함께한지 <span style="color:#9bbc0f;font-size:7px;">${f.togetherdays}</span>일째!</div>`
    : '';
  return `
    <div style="height:100%;display:flex;flex-direction:column;">
      <div class="result-header">
        <span>${f.name}의 사주</span>
        <span style="font-size:5px;" class="blink">1/3</span>
      </div>
      <div class="result-body">
        <div style="display:flex;gap:8px;align-items:center;">
          <canvas id="rc" width="48" height="48" style="image-rendering:pixelated;flex-shrink:0;"></canvas>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div><span class="tag">${f.zodiac}띠</span> <span class="tag">${f.element}(${ELEM_DESC[f.element]})</span></div>
            <div class="s-xs">${f.season}생 · ${f.years}살 ${f.months}개월</div>
            <div class="s-xs" style="line-height:1.8;">${f.fd.trait}</div>
          </div>
        </div>
        ${together}
        <div class="today-box">${BREED_MSG[f.breed]}</div>
      </div>
      <div style="border-top:2px solid #0f380f;padding:5px 8px;background:#8bac0f;display:flex;justify-content:space-between;align-items:center;">
        <span class="s-xs">A: 다음 페이지</span>
        <span class="s-xs blink">▶▶</span>
      </div>
    </div>`;
}

function buildPage1(f) {
  function bar(n) {
    return `<div class="stat-bar">${[1,2,3,4,5].map(i=>`<div class="stat-pip${i<=n?' filled':''}"></div>`).join('')}</div>`;
  }
  return `
    <div style="height:100%;display:flex;flex-direction:column;">
      <div class="result-header">
        <span>오늘의 운세</span>
        <span style="font-size:5px;" class="blink">2/3</span>
      </div>
      <div class="result-body">
        <div class="stat-row"><span>💕 애정운</span>${bar(f.fd.love)}</div>
        <div class="stat-row"><span>🦴 건강운</span>${bar(f.fd.health)}</div>
        <div class="stat-row"><span>🍖 간식운</span>${bar(f.fd.money)}</div>
        <div style="height:6px;"></div>
        <div class="today-box">
          <div style="margin-bottom:3px;">🍀 럭키템: ${f.fd.lucky}</div>
          <div style="margin-bottom:3px;">⚠️ 주의: ${f.fd.warn}</div>
          <div>${SEASON_MSG[f.season]}</div>
        </div>
      </div>
      <div style="border-top:2px solid #0f380f;padding:5px 8px;background:#8bac0f;display:flex;justify-content:space-between;">
        <span class="s-xs">B: 이전</span>
        <span class="s-xs blink">▶▶ A: 다음</span>
      </div>
    </div>`;
}

function buildPage2(f) {
  const adopt = f.adopt
    ? `<div class="s-xs" style="text-align:center;">🏠 ${f.adopt} 입양<br>함께한 ${f.togetherdays}일이 소중해요</div>`
    : '';
  return `
    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;">
      <canvas id="rc" width="48" height="48" style="image-rendering:pixelated;" class="bounce"></canvas>
      <div class="s-sm" style="text-align:center;line-height:2.2;">${f.name}(이)는<br>오늘도 최고야! 🐾</div>
      ${adopt}
      <div class="s-xs" style="color:#306230;text-align:center;line-height:2;">주인아 간식줘<br>사주에 나와있어</div>
      <button class="px-btn" onclick="resetGame()" style="font-size:6px;padding:5px;">↩ 다시하기</button>
    </div>`;
}

function resetGame() {
  G = { screen:'title', name:'', breed:'말티즈', birth:'', adopt:'', fortune:null, rPage:0 };
  render();
}

// =============================================
// CONTROLS
// =============================================
function pressA() {
  if(G.screen==='title') { G.screen='input'; render(); }
  else if(G.screen==='result') { G.rPage=(G.rPage+1)%3; renderResult(document.getElementById('screen')); }
}
function pressB() {
  if(G.screen==='input') { G.screen='title'; render(); }
  else if(G.screen==='result') { G.rPage=Math.max(0,G.rPage-1); renderResult(document.getElementById('screen')); }
}
function pressStart() {
  if(G.screen==='title') { G.screen='input'; render(); }
  else if(G.screen==='input') goFortune();
}
function pressSelect() {}
function dpad(dir) {
  if(G.screen==='result') {
    if(dir==='right'||dir==='down') pressA();
    if(dir==='left'||dir==='up') pressB();
  }
}

// keyboard support
document.addEventListener('keydown', e => {
  if(e.key==='Enter'||e.key===' ') pressA();
  if(e.key==='Backspace') pressB();
  if(e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); dpad('right'); }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); dpad('left'); }
});

render();
</script>
