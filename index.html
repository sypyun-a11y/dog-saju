<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 왈왈 사주팔자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: 'Press Start 2P', monospace;
}

.gb {
  background: linear-gradient(160deg, #b0bed0, #8b9dc3);
  border-radius: 18px 18px 60px 60px;
  padding: 20px 20px 36px;
  width: 500px;
  box-shadow: 6px 6px 0 #5a6a8a, -3px -3px 0 #c8d5f0, 0 32px 64px rgba(0,0,0,0.7);
}

.gb-label {
  text-align: center;
  font-size: 9px;
  color: #4a5a7a;
  margin-bottom: 8px;
  letter-spacing: 3px;
}

.bezel {
  background: #1e2030;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 14px;
  box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5);
}

.screen {
  background: #9bbc0f;
  border-radius: 4px;
  width: 100%;
  height: 340px;
  position: relative;
  overflow: hidden;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.blink { animation: blink 1s infinite; }
.bounce { animation: bounce 0.8s infinite; }
.fade-in { animation: fadeIn 0.3s ease; }

/* BUTTONS */
.gb-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;
  margin-bottom: 10px;
}

.dpad {
  display: grid;
  grid-template: repeat(3,34px)/repeat(3,34px);
  gap: 3px;
}
.dpad-btn {
  background: #3a4a6a;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  color: #8b9dc3;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dpad-btn:hover { background: #4a5a7a; }
.dpad-center { background: #2a3a5a !important; border-radius: 50% !important; cursor: default !important; }

.ab-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
}
.ab-row { display: flex; gap: 10px; }
.btn-circle {
  width: 50px; height: 50px;
  border-radius: 50%;
  border: none;
  background: #b03060;
  color: white;
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  cursor: pointer;
  box-shadow: 3px 4px 0 #7a1a40;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-circle:active { transform: translateY(3px); box-shadow: 0 1px 0 #7a1a40; }
.btn-circle:hover { background: #c04070; }

.start-select {
  display: flex;
  justify-content: center;
  gap: 20px;
}
.btn-flat {
  width: 54px; height: 14px;
  background: #3a4a6a;
  border: none;
  border-radius: 7px;
  cursor: pointer;
}
.btn-flat:hover { background: #4a5a7a; }
.btn-label {
  display: flex;
  justify-content: center;
  gap: 46px;
  margin-top: 4px;
}
.btn-label span { font-size: 7px; color: #4a5a7a; }

/* SCREEN CONTENT */
.s-full {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
  gap: 8px;
}

.s-title {
  font-size: 18px;
  color: #0f380f;
  text-align: center;
  line-height: 2.2;
  text-shadow: none;
}

.s-sub { font-size: 9px; color: #0f380f; text-align: center; line-height: 2; }
.s-sm { font-size: 9px; color: #0f380f; }
.s-xs { font-size: 8px; color: #0f380f; }
.s-mid { font-size: 9px; color: #0f380f; }

.dialogue {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #9bbc0f;
  border-top: 3px solid #0f380f;
  padding: 8px;
  min-height: 72px;
}

/* FORM */
.form-scroll {
  height: 100%;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  scrollbar-width: none;
}
.form-scroll::-webkit-scrollbar { display: none; }

.form-section { font-size: 10px; color: #0f380f; border-bottom: 2px solid #306230; padding-bottom: 4px; }
.form-label { font-size: 9px; color: #0f380f; margin-bottom: 5px; }

.px-input {
  width: 100%;
  background: #8bac0f;
  border: 2px solid #0f380f;
  color: #0f380f;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 7px;
  outline: none;
}
.px-input:focus { background: #306230; color: #9bbc0f; }
.px-input[type="date"] { cursor: pointer; }

.breed-scroll {
  max-height: 130px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #0f380f #8bac0f;
  border: 2px solid #0f380f;
  padding: 3px;
  background: #8bac0f;
}
.breed-scroll::-webkit-scrollbar { width: 6px; }
.breed-scroll::-webkit-scrollbar-track { background: #8bac0f; }
.breed-scroll::-webkit-scrollbar-thumb { background: #0f380f; }

.breed-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 3px;
}
.breed-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 4px 2px;
  border: 2px solid transparent;
  border-radius: 2px;
}
.breed-item:hover { border-color: #306230; }
.breed-item.sel { border-color: #0f380f; background: #306230; }
.breed-item canvas { image-rendering: pixelated; }
.breed-name { font-size: 6px; color: #0f380f; margin-top: 2px; text-align: center; }
.breed-item.sel .breed-name { color: #9bbc0f; }

.px-btn {
  background: #0f380f;
  color: #9bbc0f;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px;
  cursor: pointer;
  width: 100%;
}
.px-btn:hover { background: #306230; }

/* RESULT */
.result-header {
  background: #0f380f;
  color: #9bbc0f;
  font-size: 10px;
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.result-body {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  scrollbar-width: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.result-body::-webkit-scrollbar { display: none; }

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  color: #0f380f;
  border-bottom: 1px solid #8bac0f;
  padding: 6px 0;
}
.stat-bar {
  display: flex;
  gap: 3px;
}
.stat-pip {
  width: 11px; height: 11px;
  border: 1px solid #0f380f;
  background: transparent;
}
.stat-pip.filled { background: #0f380f; }

.tag {
  display: inline-block;
  background: #0f380f;
  color: #9bbc0f;
  font-size: 8px;
  padding: 4px 6px;
}

.today-box {
  background: #8bac0f;
  border: 2px solid #0f380f;
  padding: 8px;
  font-size: 8px;
  color: #0f380f;
  line-height: 2.1;
}

.together-badge {
  background: #306230;
  color: #9bbc0f;
  font-size: 8px;
  padding: 6px 10px;
  text-align: center;
  border: 2px solid #0f380f;
}
</style>
</head>
<body>

  <div class="btn-label">
    <span>SELECT</span>
    <span>START</span>
  </div>
</div>

  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = c;
    ctx.fillRect(x * scale, y * scale, scale, scale);

}

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function makeFortune(name, breed, birth, adopt) {
  const bd = new Date(birth);
  const zodiac = getZodiac(bd.getFullYear());
  const element = getElement(bd.getFullYear());
  const season = getSeason(bd.getMonth()+1);
  const fd = FORTUNE_DB[zodiac] || FORTUNE_DB['개'];
  const today = new Date().toISOString().split('T')[0];
  const agedays = daysBetween(birth, today);
  const togetherdays = adopt ? daysBetween(adopt, today) : null;
  const years = Math.floor(agedays/365);
  const months = Math.floor((agedays%365)/30);
  return { zodiac, element, season, fd, breed, name, birth, adopt, agedays, togetherdays, years, months };
}

      </div>

        <span style="font-size:8px;color:#0f380f;">B: 이전</span>
        <span style="font-size:8px;color:#0f380f;" class="blink">▶▶ A: 다음</span>
      </div>
    </div>`;
}

function buildPage2(f) {
  const adopt = f.adopt
    ? `<div style="font-size:8px;color:#0f380f;text-align:center;line-height:2;">🏠 ${f.adopt} 입양<br>함께한 ${f.togetherdays}일이 소중해요</div>`
    : '';
  return `
    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;">
      <canvas id="rc" width="80" height="80" style="image-rendering:pixelated;" class="bounce"></canvas>
      <div style="font-size:11px;color:#0f380f;text-align:center;line-height:2.2;">${f.name}(이)는<br>오늘도 최고야! 🐾</div>
      ${adopt}
      <div style="font-size:8px;color:#306230;text-align:center;line-height:2.2;">주인아 간식줘<br>사주에 나와있어</div>
      <button class="px-btn" onclick="resetGame()" style="font-size:8px;padding:8px;margin-top:2px;">↩ 다시하기</button>
    </div>`;
}

function resetGame() {
  G = { screen:'title', name:'', breed:'말티즈', birth:'', adopt:'', fortune:null, rPage:0 };
  render();
}

// =============================================
// CONTROLS
// =============================================
function pressA() {
  if(G.screen==='title') { G.screen='input'; render(); }
  else if(G.screen==='result') { G.rPage=(G.rPage+1)%3; renderResult(document.getElementById('screen')); }
}
function pressB() {
  if(G.screen==='input') { G.screen='title'; render(); }
  else if(G.screen==='result') { G.rPage=Math.max(0,G.rPage-1); renderResult(document.getElementById('screen')); }
}
function pressStart() {
  if(G.screen==='title') { G.screen='input'; render(); }
  else if(G.screen==='input') goFortune();
}
function pressSelect() {}
function dpad(dir) {
  if(G.screen==='result') {
    if(dir==='right'||dir==='down') pressA();
    if(dir==='left'||dir==='up') pressB();
  }
}

// keyboard support - 입력창 포커스 중엔 게임 키 무시
function isInputFocused() {
  const t = document.activeElement && document.activeElement.tagName;
  return t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT';
}
document.addEventListener('keydown', e => {
  if(isInputFocused()) return; // 입력 중엔 게임 키 차단
  if(e.key==='Enter'||e.key===' ') { e.preventDefault(); pressA(); }
  if(e.key==='Backspace') { e.preventDefault(); pressB(); }
  if(e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); dpad('right'); }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); dpad('left'); }
});

render();
</script>
</body>
</html>
